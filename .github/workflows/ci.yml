name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -q

  lint:
    # Style and type-check are advisory until the codebase is fully clean.
    # They report warnings but never block a merge. See issue #1.
    name: Lint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff>=0.1 black>=23.12 mypy>=1.7

      - name: Ruff
        continue-on-error: true
        run: ruff check skills backtest tests

      - name: Black (check only)
        continue-on-error: true
        run: black --check skills backtest tests

      - name: Mypy
        continue-on-error: true
        run: mypy skills backtest --ignore-missing-imports
