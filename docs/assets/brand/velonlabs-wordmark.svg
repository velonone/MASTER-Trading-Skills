<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" role="img" aria-label="VelonLabs">
  <title>VelonLabs</title>
  <!--
    Compact wordmark: mark + "VELONLABS" text. Use in narrow contexts
    (npm card, GitHub release notes, footer attribution).
  -->
  <defs>
    <style>
      .mark   { stroke: #7C5CFF; stroke-width: 16; fill: none; stroke-linejoin: miter; stroke-linecap: square; }
      .accent { stroke: #7C5CFF; stroke-width: 16; fill: none; opacity: 0.55; }
      .word   { font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
                font-weight: 700; font-size: 56px; fill: #0A0A14; letter-spacing: 0.18em; }
      @media (prefers-color-scheme: dark) {
        .word { fill: #FAFAFC; }
      }
    </style>
  </defs>

  <g transform="translate(20, 30)">
    <path class="mark"   d="M 10 10 L 50 90 L 90 10" />
    <path class="mark"   d="M 40 10 L 80 90 L 120 10" />
    <path class="accent" d="M 70 10 L 110 90 L 140 40" />
  </g>

  <text class="word" x="190" y="105">VELONLABS</text>
</svg>
