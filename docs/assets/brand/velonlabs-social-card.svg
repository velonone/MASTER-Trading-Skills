<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Diagonal background gradient: deep ink → violet → ink -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0A0414"/>
      <stop offset="55%"  stop-color="#1A0F3A"/>
      <stop offset="100%" stop-color="#0A0414"/>
    </linearGradient>

    <!-- Soft radial glow behind the V monogram -->
    <radialGradient id="glow" cx="0.22" cy="0.5" r="0.4" fx="0.22" fy="0.5">
      <stop offset="0%"   stop-color="#7C5CFF" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#7C5CFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Title gradient: white at top → violetSoft at bottom -->
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FAFAFC"/>
      <stop offset="100%" stop-color="#B5A3FF"/>
    </linearGradient>

    <!-- Subtle vertical fade for the V strokes -->
    <linearGradient id="vstroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#B5A3FF"/>
      <stop offset="100%" stop-color="#5840D4"/>
    </linearGradient>
  </defs>

  <!-- Layered background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Subtle grid lines for technical feel -->
  <g stroke="#7C5CFF" stroke-width="0.5" opacity="0.06">
    <line x1="0"    y1="160" x2="1280" y2="160"/>
    <line x1="0"    y1="320" x2="1280" y2="320"/>
    <line x1="0"    y1="480" x2="1280" y2="480"/>
    <line x1="320"  y1="0"   x2="320"  y2="640"/>
    <line x1="640"  y1="0"   x2="640"  y2="640"/>
    <line x1="960"  y1="0"   x2="960"  y2="640"/>
  </g>

  <!-- ───── LEFT: V monogram ───── -->
  <g transform="translate(140, 180)">
    <!-- Outer V outline -->
    <path
      d="M 20 20 L 140 260 L 260 20"
      fill="none"
      stroke="url(#vstroke)"
      stroke-width="22"
      stroke-linejoin="miter"
      stroke-linecap="square"/>
    <!-- Inner accent V (offset, lighter) -->
    <path
      d="M 70 40 L 140 200 L 210 40"
      fill="none"
      stroke="#B5A3FF"
      stroke-width="14"
      stroke-linejoin="miter"
      stroke-linecap="square"
      opacity="0.55"/>
  </g>

  <!-- ───── RIGHT: text block ───── -->
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
    <!-- Brand pill -->
    <g transform="translate(480, 188)">
      <rect width="160" height="34" rx="17"
        fill="#7C5CFF" fill-opacity="0.15"
        stroke="#7C5CFF" stroke-width="1.2"/>
      <text x="80" y="23"
        font-size="13" font-weight="600"
        fill="#B5A3FF" text-anchor="middle"
        letter-spacing="3.5">VELONLABS</text>
    </g>

    <!-- Main title -->
    <text x="480" y="310"
      font-size="62" font-weight="800"
      fill="url(#title)">master-trading-skills</text>

    <!-- Tagline (two lines) -->
    <text x="480" y="375"
      font-size="26" font-weight="400"
      fill="#B5A3FF" opacity="0.85">Trading infrastructure your AI agent</text>
    <text x="480" y="412"
      font-size="26" font-weight="400"
      fill="#B5A3FF" opacity="0.85">can actually audit.</text>

    <!-- Status row -->
    <text x="480" y="490"
      font-size="18" font-weight="500"
      font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
      fill="#7C5CFF" letter-spacing="1.2">v3.1.0   ·   139 tests   ·   MIT   ·   by VelonLabs</text>
  </g>

  <!-- Bottom accent rule -->
  <rect x="0" y="636" width="1280" height="4"
    fill="#7C5CFF" opacity="0.75"/>
</svg>